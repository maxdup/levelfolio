<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Maxime Dupuis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=0.75, user-scalable=0"/>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <script>
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    }(window.location));
  </script>
</head>
<body>
  <div id="root"></div>
  <noscript>
    <h1>Hey! this site requires javascript enabled to function.</h1>
    <p>You either need to switch to a browser that supports javascript, or you need to disable your javascript blocker.</p>
  </noscript>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
